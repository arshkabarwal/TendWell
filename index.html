<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TendWell</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #FBF6EE;
      color: #231A10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }
    h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; }
    p { color: #6B5438; font-size: 16px; margin-top: 10px; max-width: 360px; line-height: 1.6; }
    nav { margin-top: 40px; display: flex; gap: 24px; }
    nav a {
      font-size: 14px;
      color: #F0A020;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid rgba(240,160,32,0.3);
      padding-bottom: 2px;
    }
    nav a:hover { border-bottom-color: #F0A020; }
    footer { margin-top: 60px; font-size: 12px; color: #9E8668; }
    .support {
      margin-top: 48px;
      background: #fff;
      border: 1px solid rgba(35,26,16,0.1);
      border-radius: 16px;
      padding: 24px 28px;
      max-width: 360px;
      width: 100%;
      text-align: left;
    }
    .support h2 { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; color: #9E8668; text-transform: uppercase; margin-bottom: 10px; }
    .support p { font-size: 14px; color: #6B5438; margin-top: 0; }
    .support a {
      display: inline-block;
      margin-top: 16px;
      background: #3AAFA9;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
    }
    .support a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>TendWell</h1>
  <p>A calmer way to care for your dog.</p>

  <div class="support">
    <h2>Support</h2>
    <p>Have a question, suggestion, or anything on your mind? We'd love to hear from you.</p>
    <a href="mailto:arshkabarwal@gmail.com?subject=TendWell%20Support">Email Support</a>
  </div>

  <nav>
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Use</a>
  </nav>
  <footer>© 2026 TendWell. All rights reserved.</footer>
</body>
</html>
