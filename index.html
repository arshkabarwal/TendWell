<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TendWell</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #FBF6EE;
      color: #231A10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }
    h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; }
    p { color: #6B5438; font-size: 16px; margin-top: 10px; max-width: 360px; line-height: 1.6; }
    nav { margin-top: 40px; display: flex; gap: 24px; }
    nav a {
      font-size: 14px;
      color: #F0A020;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid rgba(240,160,32,0.3);
      padding-bottom: 2px;
    }
    nav a:hover { border-bottom-color: #F0A020; }
    footer { margin-top: 60px; font-size: 12px; color: #9E8668; }
  </style>
</head>
<body>
  <h1>TendWell</h1>
  <p>A calmer way to care for your dog.</p>
  <nav>
    <a href="privacy.html">Privacy Policy</a>

</html>
